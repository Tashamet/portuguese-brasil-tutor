# portuguese-brasil-tutor — main config.
# Copy to config.yaml (or run `tutor.py setup`). Secrets live in env vars,
# never here: TELEGRAM_BOT_TOKEN, ELEVENLABS_API_KEY, OPENAI_API_KEY.

deployment_profile: skill-only   # skill-only | local-notifier | remote-notifier | scheduled-agent
interface_language: ""           # ru | en | uk — asked on first run, then fixed
student_name: ""                 # used to greet the learner by name
timezone: "America/Sao_Paulo"    # IANA tz — reminders fire in YOUR time, not the server's UTC
review_intervals: [2, 7, 30]     # Ebbinghaus spaced repetition (days)
daily_new_words: 1

lessons:                         # lesson reminders (separate from word reviews)
  reminder_enabled: true
  days: daily                    # daily | a list like mon,wed,fri
  time: "19:00"                  # when to nudge for a lesson

tts:
  provider: local                # local (Piper, default) | system (macOS say) | cloud
  local:                         # Piper — offline, free, cross-platform; voices auto-download
    # voices_dir: ~/.local/share/piper-tts/voices
    # piper_voices: { pt: pt_BR-faber-medium, ru: ru_RU-irina-medium, en: en_US-lessac-medium, uk: uk_UA-ukrainian_tts-medium }
  system:
    voice_pt: Luciana            # built-in macOS pt-BR voice (macOS only)
    # voices: { pt: Luciana, ru: Milena, en: Samantha, uk: Lesya }
  cloud:
    engine: elevenlabs           # elevenlabs | openai
    voice_pt: ""                 # ElevenLabs voice id, or OpenAI voice name (e.g. alloy)
    api_key: ""                  # paste your ElevenLabs / OpenAI key here (easiest),
                                 # OR leave empty and use the env var
                                 # ELEVENLABS_API_KEY / OPENAI_API_KEY (env wins).
                                 # Note: only needed where audio is generated
                                 # (your Claude Code machine), not on a notifier host.

telegram:
  enabled: false                 # true for local-notifier / remote-notifier
  chat_id: ""                    # your chat id (via @userinfobot)
  send_time: "09:00"             # used by cron/launchd
  # bot token -> env TELEGRAM_BOT_TOKEN

sync:
  mode: shared                   # shared (same disk) | git (repo for remote notifier)
  git:
    repo_url: ""                 # private repo; auth via deploy key

deploy:
  ssh_host: ""                   # user@host for remote-notifier; empty = local
